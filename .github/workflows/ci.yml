name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Install supported npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run verify:release
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/coverage-final.json,./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-failures
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  node-20-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 20.18.0
          package-manager-cache: false
      - name: Install supported npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npm run type-check
      # Current Vitest and Rolldown require Node 20.19 or newer. Keep this lane
      # focused on the package's exact Node 20.18 runtime floor.
      - run: npm run build
