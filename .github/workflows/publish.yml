name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (leave empty for package.json version)'
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for repos.updateRelease in notification steps
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${TAG#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version $PKG_VERSION does not match release tag $TAG"
            exit 1
          fi

      - name: Run validation
        run: npm run validate
      
      - name: Build package
        run: npm run build
      
      - name: Verify build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful"
          ls -lh dist/
      
      - name: Set version (manual trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version
      
      - name: Publish to npm
        # Provenance is currently disabled because npm rejects this repo's
        # OIDC publish identity with a misleading E404. To re-enable:
        #   1. Register this repo + .github/workflows/publish.yml as an OIDC
        #      Trusted Publisher at
        #      https://www.npmjs.com/package/signalk-virtual-weather-sensors/access
        #   2. Add `id-token: write` back to the permissions block above.
        #   3. Restore `--provenance` to the publish command below.
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Append npm publish status to release body
        if: ${{ !cancelled() && github.event_name == 'release' }}
        uses: actions/github-script@v7
        with:
          script: |
            // GitHub releases have no comments REST endpoint, so this step
            // appends a one-line status to the release body instead. Runs on
            // both success and failure paths (but not on cancel) so the
            // release page reflects the publish outcome.
            const release = context.payload.release;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const succeeded = context.job && '${{ job.status }}' === 'success';
            const version = require('./package.json').version;
            const note = succeeded
              ? `\n\n---\n✅ Published to npm: https://www.npmjs.com/package/signalk-virtual-weather-sensors/v/${version}`
              : `\n\n---\n❌ npm publish failed. See the [workflow run](${runUrl}).`;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: `${release.body || ''}${note}`,
            });
            // Don't call core.setFailed here: the failing publish step has
            // already set the job status. Marking this step failed too would
            // misleadingly imply the release-body update itself failed.

  verify-publish:
    needs: publish
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Wait for npm registry to update
        run: sleep 30
      
      - name: Verify package on npm
        run: |
          PACKAGE_NAME="signalk-virtual-weather-sensors"
          VERSION=$(npm view $PACKAGE_NAME version)
          
          if [ -z "$VERSION" ]; then
            echo "Failed to verify package on npm registry"
            exit 1
          fi
          
          echo "Successfully verified $PACKAGE_NAME@$VERSION on npm"
          echo "Package URL: https://www.npmjs.com/package/$PACKAGE_NAME"
      
      - name: Test installation
        run: |
          mkdir test-install
          cd test-install
          npm init -y
          npm install signalk-virtual-weather-sensors
          
          if [ ! -d "node_modules/signalk-virtual-weather-sensors" ]; then
            echo "Installation verification failed"
            exit 1
          fi
          
          echo "Installation verified successfully"