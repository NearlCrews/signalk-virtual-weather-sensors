name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Install supported npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.18.0
      - name: Verify the release tag matches package.json
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Release tag ($TAG_NAME) does not match expected tag ($EXPECTED_TAG)" >&2
            exit 1
          fi
      - name: Verify the release commit is on main
        run: |
          git fetch origin main --no-tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Confirm release approval gate
        run: npm run release:check
        env:
          SVWS_RELEASE_APPROVED: 'true'
      - run: npm run verify:release
      - name: Pack the verified plugin once
        id: pack
        run: |
          mkdir artifacts
          npm pack --json --ignore-scripts --pack-destination artifacts > pack.json
          FILENAME="$(node -p "JSON.parse(require('fs').readFileSync('pack.json', 'utf8'))[0].filename")"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-package
          path: artifacts/${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-package
          path: artifacts
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false
      - name: Install supported npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.18.0
      - run: npm publish ./artifacts/*.tgz --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
