name: Signal K Plugin CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: plugin-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@5d9639abc03bc3387d4b1469c8b0c7fda8aa7130
    with:
      test-command: npm run test:run
      build-command: npm run build
      format-check-command: npm run format:check
      coverage-command: npm run test:coverage
      node-versions: '["22", "24"]'
      enable-armv7: true
      enable-signalk-integration: true
      signalk-server-versions: '["2.24.0", "latest"]'
