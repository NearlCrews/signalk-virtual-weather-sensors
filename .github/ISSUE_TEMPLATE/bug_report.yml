name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Install plugin version X.X.X
        2. Configure with AccuWeather API key
        3. Start Signal K server
        4. Observe error in logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The plugin should...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Instead, the plugin...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy and paste any relevant log output (redact API keys!)
      render: shell
      placeholder: |
        Paste logs here

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: Which version of signalk-virtual-weather-sensors are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: signalk-version
    attributes:
      label: Signal K Server Version
      description: Which version of Signal K server are you running?
      placeholder: "2.0.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Which version of Node.js? (run `node --version`)
      placeholder: "v20.10.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      options:
        - Linux (Raspberry Pi OS)
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Plugin Configuration
      description: Your plugin configuration (redact API keys!)
      render: json
      placeholder: |
        {
          "accuWeatherApiKey": "REDACTED",
          "updateFrequency": 5,
          "emissionInterval": 5
        }

  - type: checkboxes
    id: accuweather
    attributes:
      label: AccuWeather API Status
      description: Please verify the following about your AccuWeather API setup
      options:
        - label: I have a valid AccuWeather API key
        - label: The API key is not rate-limited or expired
        - label: The API responds correctly when tested externally

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      description: Please verify the following before submitting
      options:
        - label: I have checked existing issues to avoid duplicates
          required: true
        - label: I have included all relevant information above
          required: true
        - label: I have redacted any sensitive information (API keys, coordinates)
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (screenshots, related issues, etc.)
      placeholder: Add any other context or screenshots here