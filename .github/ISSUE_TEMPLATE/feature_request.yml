name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible to help us understand your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the use case?
      placeholder: |
        I'm working on a marine vessel and need to...
        Currently, the plugin doesn't support...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
      placeholder: |
        The plugin should add...
        It would work by...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Have you considered any alternative solutions or workarounds?
      placeholder: |
        I've considered...
        Another approach could be...

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What type of feature is this?
      options:
        - Weather Data (new data points)
        - NMEA2000 Integration
        - Signal K Paths
        - API Integration (AccuWeather or other)
        - Calculations (wind, temperature, etc.)
        - Configuration Options
        - Performance Improvement
        - Documentation
        - Developer Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical (blocking my use case)
        - High (important for my workflow)
        - Medium (nice to have)
        - Low (minor enhancement)
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact Assessment
      description: Who would benefit from this feature? How would it affect existing functionality?
      placeholder: |
        This would help users who...
        It would not affect existing...
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Examples or References
      description: Links to similar features in other projects, specifications, or documentation
      placeholder: |
        Similar to how X plugin does...
        NMEA2000 spec reference: ...
        Signal K path convention: ...

  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility Considerations
      description: Please check any that apply to your feature request
      options:
        - label: This feature should maintain backward compatibility
        - label: This may require breaking changes
        - label: This affects NMEA2000 network integration
        - label: This affects Signal K path structure
        - label: This requires new dependencies

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: If you have ideas about how to implement this, please share them
      placeholder: |
        This could be implemented by...
        The code changes might involve...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to help implement this feature?
      options:
        - label: I would like to implement this feature myself
        - label: I can help test this feature
        - label: I can help with documentation
        - label: I can provide domain expertise

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      description: Please verify the following before submitting
      options:
        - label: I have checked existing issues and discussions to avoid duplicates
          required: true
        - label: I have provided a clear use case and problem statement
          required: true
        - label: This feature aligns with the plugin's scope (weather data + NMEA2000)
          required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or mockups that would help explain this feature
      placeholder: Add any other context, diagrams, or screenshots here