<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-virtual-weather-sensors.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific colour with a 2-3 shape glyph. This badge is the only
  region that varies between sibling plugins.

  This variant's badge: warm yellow (#FBC02D) with a dark thundercloud
  glyph (cloud + lightning bolt), signaling weather/atmosphere with
  enough visual movement to distinguish the plugin at thumbnail size.
  The cloud and bolt are drawn slightly bolder than the original cut so
  the silhouette holds up at 32px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Virtual Weather Sensors plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (sun yellow for weather) -->
  <circle cx="388" cy="388" r="84" fill="#FBC02D" stroke="#FFFFFF" stroke-width="8"/>

  <!--
    Badge glyph: thundercloud (cloud silhouette + lightning bolt below).
    Cloud sits in the upper half of the badge; bolt strikes downward from
    just below the cloud's base. Both filled in the family glyph dark
    (#1B3A4B) so they read as a single thundercloud silhouette at 32px.
  -->
  <g fill="#1B3A4B">
    <circle cx="362" cy="374" r="23"/>
    <circle cx="396" cy="362" r="31"/>
    <circle cx="421" cy="378" r="21"/>
    <rect x="356" y="372" width="72" height="26" rx="13"/>
    <path d="M 378 398 v 30 h 9 v 24 l 19 -33 h -11 l 11 -21 z"/>
  </g>
</svg>
